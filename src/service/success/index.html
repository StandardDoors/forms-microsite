<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Submitted Successfully | Standard Doors Forms</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 md:min-h-screen md:flex md:flex-col">
    {{> header}}

    <main class="md:flex-grow max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-lg shadow-md p-8 text-center">
            <div class="mb-6">
                <svg class="mx-auto h-16 w-16 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            
            <h1 class="text-3xl font-bold text-gray-900 mb-4">Thank You!</h1>
            
            <p class="text-lg text-gray-700 mb-6">
                Your service request has been submitted successfully.
            </p>
            
            <p class="text-gray-600 mb-8">
                Our team will review your request and get back to you as soon as possible. 
                If you provided your email address, you should receive a confirmation shortly.
            </p>
            
            <div class="space-y-4">
                <a href="/" class="inline-block bg-blue-600 text-white py-3 px-8 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 font-medium">
                    Return to Home
                </a>
                <div>
                    <a href="/service/" class="text-blue-600 hover:text-blue-800 underline text-sm">
                        Submit Another Request
                    </a>
                </div>
            </div>
        </div>
    </main>

    {{> footer}}
</body>
</html>
