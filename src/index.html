<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Doors Forms</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 md:min-h-screen md:flex md:flex-col">
    {{> header}}

    <main class="md:flex-grow">
        <div class="bg-gray-100 py-12 px-4 sm:px-6 lg:px-8 mb-12">
            <div class="max-w-7xl mx-auto text-center">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Service & Support</h1>
                <p class="text-gray-600">Quality service for quality doors — we're here to help.</p>
            </div>
        </div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid md:grid-cols-2 gap-8 max-w-3xl mx-auto">
                <a href="/service/" class="block p-8 bg-white rounded-lg shadow-md hover:shadow-lg transition">
                    <div class="flex justify-center mb-4">
                        <svg class="h-16 w-16 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <h2 class="text-xl font-semibold text-gray-900 mb-2">Service Request Form</h2>
                    <p class="text-gray-600">Submit a service request for your Standard Doors product</p>
                </a>
                <a href="/findyourproductionnumber/" class="block p-8 bg-white rounded-lg shadow-md hover:shadow-lg transition">
                    <div class="flex justify-center mb-4">
                        <svg class="h-16 w-16 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <h2 class="text-xl font-semibold text-gray-900 mb-2">Find Your Production Number</h2>
                    <p class="text-gray-600">Learn how to locate your production number on patio and entrance doors</p>
                </a>
            </div>
        </div>
    </main>

    {{> footer}}
</body>
</html>
